<!-- ---------------- Firebase SDK ---------------- -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  // ---------------- Firebase 初始化 ----------------
  const firebaseConfig = {
    apiKey: "AIzaSyCfxDOOzTLbmQRfvW275hJrtOnX_t-6-yc",
    authDomain: "hsinformation.firebaseapp.com",
    projectId: "hsinformation",
    storageBucket: "hsinformation.firebasestorage.app",
    messagingSenderId: "245515525647",
    appId: "1:245515525647:web:00bf24514009bddd02cd7a",
    measurementId: "G-DG6Z64PHF6"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const contactForm = document.getElementById('contact-form');

  contactForm.addEventListener('submit', async e => {
    e.preventDefault();

    const name = document.getElementById('contact-name').value;
    const contact = document.getElementById('contact-info').value.trim();
    const message = document.getElementById('contact-message').value;




    const phonePattern = /^09\d{8}$/; // 台灣手機格式
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; // Email格式

    if (!phonePattern.test(contact) && !emailPattern.test(contact)) {
      alert("請輸入有效的電話號碼或 Email！");
      return;
    }



    try {
      await db.collection('messages').add({
        name: name,
        contact: contact,
        message: message,
        createdAt: new Date()
      });
      alert('✅ 謝謝您的留言，我們會盡快與您聯絡！');
      contactForm.reset();
    } catch (error) {
      console.error(error);
      alert('❌ 送出失敗，請稍後再試');
    }
  });
</script>
