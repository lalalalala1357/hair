  article h3 { margin:0 0 8px; color:#3a6f45; }
  article time { display:block; font-size:0.85rem; color:#777; margin-bottom:10px; }
  article p {

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCfxDOOzTLbmQRfvW275hJrtOnX_t-6-yc",
  authDomain: "hsinformation.firebaseapp.com",
  projectId: "hsinformation",
  storageBucket: "hsinformation.firebasestorage.app",
  messagingSenderId: "245515525647",
  appId: "1:245515525647:web:00bf24514009bddd02cd7a",
  measurementId: "G-DG6Z64PHF6"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const articlesDiv = document.getElementById("articles");
const errorDiv = document.getElementById("error");
const bannerDiv = document.getElementById("bannerDisplay");
const bannerText = document.getElementById("bannerText");

async function loadBanner(){
  const doc = await db.collection("banner").doc("main").get();
  if(doc.exists){
    const data = doc.data();
    bannerText.textContent = data.title ? `${data.title}｜${data.content}` : data.content;
    bannerDiv.classList.remove("hidden");
  }
}

async function loadAnnouncements(){
  articlesDiv.innerHTML = "";
  errorDiv.classList.add("hidden");
  try {
    const snapshot = await db.collection("announcements")
      .orderBy("createdAt","desc")
      .get();
    if(snapshot.empty){
      articlesDiv.innerHTML = "<p style='text-align:center;'>目前沒有公告</p>";
      return;
    }
    snapshot.forEach(doc=>{
      const data = doc.data();
      const article = document.createElement("article");
      article.innerHTML = `
        <h3>${data.title}</h3>
        <time>${data.createdAt?.toDate().toLocaleDateString() || ""}</time>
        <p>${data.content}</p>
      `;
      articlesDiv.appendChild(article);
    });
  } catch(e){
    console.error(e);
    errorDiv.classList.remove("hidden");
  }
}

loadBanner();
loadAnnouncements();
</script>
